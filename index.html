<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Dream Fund Labs</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <div><p class="eyebrow">DREAM FUND LABS</p><h1>投資を、育てる。</h1></div>
      <div class="budget"><span>今月の予算</span><strong>¥5,000</strong></div>
    </header>

    <section class="hero">
      <p>今月の購入候補</p>
      <h2 id="pickName">NTT</h2>
      <div class="hero-row"><span id="pickReason">大型株枠 · まずは少額で継続</span><button id="openPick">DDを見る</button></div>
    </section>

    <nav class="tabs" aria-label="銘柄カテゴリー">
      <button class="tab active" data-filter="all">Dream20</button>
      <button class="tab" data-filter="core">大型株</button>
      <button class="tab" data-filter="dream">夢枠</button>
    </nav>

    <section>
      <div class="section-title"><h2>銘柄一覧</h2><span id="count"></span></div>
      <div id="stockList" class="stock-list"></div>
    </section>
  </main>

  <dialog id="detailModal">
    <div class="modal-head"><div><p id="detailTicker" class="eyebrow"></p><h2 id="detailName"></h2></div><button id="closeModal" aria-label="閉じる">×</button></div>
    <div id="detailBadge" class="badge"></div>
    <section class="dd"><h3>ひとことで</h3><p id="detailSummary"></p></section>
    <section class="dd"><h3>見るポイント</h3><p id="detailPoint"></p></section>
    <section class="dd"><h3>主なリスク</h3><p id="detailRisk"></p></section>
    <section class="judgement"><span>いまの判断</span><strong id="detailJudge"></strong></section>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
