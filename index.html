<!doctype html><html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><meta name="theme-color" content="#0b1020"/><title>Dream Fund Labs</title><link rel="stylesheet" href="styles.css?v=9"/></head><body><main class="app"><header><div><p class="eyebrow">DREAM FUND LABS</p><h1>投資を、育てる。</h1></div></header><section class="consult-card"><div class="consult-head"><div><p class="eyebrow">MONTHLY CONSULT</p><h2>今月、どう買う？</h2></div><button class="limit-chip" id="openBudget"><span>上限</span><strong id="budgetTotal">¥5,000</strong><b>✎</b></button></div><p class="consult-guide">予算・今の株価・Dream20・保有状況を見ながら、今月の買い方を一緒に考えます。</p><div class="consult-input-wrap"><textarea id="consultInput" rows="3" placeholder="例：3,000円くらいで、爆発力のある株を1株買いたい"></textarea><button id="sendConsult" aria-label="相談する">↑</button></div></section><nav class="tabs"><button class="tab active" data-filter="all">Dream20</button><button class="tab" data-filter="stable">安定</button><button class="tab" data-filter="growth">成長</button><button class="tab" data-filter="leap">飛躍</button></nav><section><div class="section-title"><h2>銘柄一覧</h2><span id="count"></span></div><div id="stockList" class="stock-list"></div></section></main><dialog id="budgetModal"><div class="modal-head"><div><p class="eyebrow">MONTHLY LIMIT</p><h2>今月の上限</h2></div><button id="closeBudget">×</button></div><p class="budget-help">スクロールで選ぶか、好きな金額を直接入力できます。</p><div class="single-wheel-wrap"><div class="wheel" id="budgetWheel"></div><div class="wheel-highlight"></div></div><div class="budget-direct"><span>金額を直接入力</span><label><b>¥</b><input id="budgetInput" type="text" inputmode="numeric" autocomplete="off" placeholder="例 7500"></label></div><div class="budget-modal-total"><span>今月使える上限</span><strong id="editTotal"></strong></div><button class="save-budget" id="saveBudget">保存する</button></dialog><dialog id="detailModal"><div class="modal-head"><div><p id="detailTicker" class="eyebrow"></p><h2 id="detailName"></h2></div><button id="closeModal">×</button></div><div id="detailBadge" class="badge"></div><div class="dd-lead"><p id="detailSummary"></p></div><section class="dd"><h3>① どうやって稼ぐ会社？</h3><p id="detailBusiness"></p></section><section class="dd"><h3>② 強みは何？</h3><p id="detailMoat"></p></section><section class="dd"><h3>③ 成長してる？</h3><p id="detailGrowth"></p></section><section class="dd"><h3>④ 数字で見る</h3><div id="detailMetrics" class="metrics"></div><p class="note">※ 数値はDD更新時点の目安。買う前に最新決算で再確認。</p></section><section class="dd"><h3>⑤ これから見るポイント</h3><p id="detailPoint"></p></section><section class="dd"><h3>⑥ 主なリスク</h3><p id="detailRisk"></p></section><section class="dd verdict"><h3>⑦ 結論</h3><p id="detailWhy"></p><div class="judgement"><span>いまの判断</span><strong id="detailJudge"></strong></div></section></dialog><script src="app.js?v=9"></script></body></html>
