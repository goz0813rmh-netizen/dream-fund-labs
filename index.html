<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><meta name="theme-color" content="#0b1020"/><title>Dream Fund Labs</title><link rel="stylesheet" href="styles.css?v=3"/></head>
<body><main class="app">
<header><div><p class="eyebrow">DREAM FUND LABS</p><h1>投資を、育てる。</h1></div><div class="budget"><span>今月の予算</span><strong>¥5,000</strong></div></header>
<section class="hero"><p>今月の購入候補</p><h2>NTT</h2><div class="hero-row"><span>大型株枠 · まずは少額で継続</span><button id="openPick">DDを見る</button></div></section>
<nav class="tabs"><button class="tab active" data-filter="all">Dream20</button><button class="tab" data-filter="core">大型株</button><button class="tab" data-filter="dream">夢枠</button></nav>
<section><div class="section-title"><h2>銘柄一覧</h2><span id="count"></span></div><div id="stockList" class="stock-list"></div></section>
</main>
<dialog id="detailModal"><div class="modal-head"><div><p id="detailTicker" class="eyebrow"></p><h2 id="detailName"></h2></div><button id="closeModal">×</button></div><div id="detailBadge" class="badge"></div>
<div class="dd-lead"><p id="detailSummary"></p></div>
<section class="dd"><h3>① どうやって稼ぐ会社？</h3><p id="detailBusiness"></p></section>
<section class="dd"><h3>② 強みは何？</h3><p id="detailMoat"></p></section>
<section class="dd"><h3>③ 成長してる？</h3><p id="detailGrowth"></p></section>
<section class="dd"><h3>④ 数字で見る</h3><div id="detailMetrics" class="metrics"></div><p class="note">※ 数値はDD更新時点の目安。買う前に最新決算で再確認。</p></section>
<section class="dd"><h3>⑤ これから見るポイント</h3><p id="detailPoint"></p></section>
<section class="dd"><h3>⑥ 主なリスク</h3><p id="detailRisk"></p></section>
<section class="dd verdict"><h3>⑦ 結論</h3><p id="detailWhy"></p><div class="judgement"><span>いまの判断</span><strong id="detailJudge"></strong></div></section>
</dialog><script src="app.js?v=3"></script></body></html>
