<!doctype html><html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><meta name="theme-color" content="#0b1020"/><title>Dream Fund Labs</title><link rel="stylesheet" href="styles.css?v=5"/></head><body><main class="app"><header><div><p class="eyebrow">DREAM FUND LABS</p><h1>投資を、育てる。</h1></div><button class="budget" id="openBudget"><span>今月の予算　✎</span><strong id="budgetTotal">¥5,000</strong></button></header><section class="hero"><p>今月の購入候補</p><h2>NTT</h2><div class="hero-row"><span>安定 · まずは少額で継続</span><button id="openPick">DDを見る</button></div></section><section class="budget-split"><div><span>安定</span><strong id="stableBudget">¥3,000</strong></div><div><span>成長</span><strong id="growthBudget">¥1,000</strong></div><div><span>飛躍</span><strong id="leapBudget">¥1,000</strong></div></section><nav class="tabs"><button class="tab active" data-filter="all">Dream20</button><button class="tab" data-filter="stable">安定</button><button class="tab" data-filter="growth">成長</button><button class="tab" data-filter="leap">飛躍</button></nav><section><div class="section-title"><h2>銘柄一覧</h2><span id="count"></span></div><div id="stockList" class="stock-list"></div></section></main><dialog id="budgetModal"><div class="modal-head"><div><p class="eyebrow">MONTHLY BUDGET</p><h2>今月の予算</h2></div><button id="closeBudget">×</button></div><p class="budget-help">金額はこのiPhoneに保存されます。</p><label class="budget-field"><span>安定</span><input id="stableInput" type="number" inputmode="numeric" min="0" step="100"/></label><label class="budget-field"><span>成長</span><input id="growthInput" type="number" inputmode="numeric" min="0" step="100"/></label><label class="budget-field"><span>飛躍</span><input id="leapInput" type="number" inputmode="numeric" min="0" step="100"/></label><div class="budget-modal-total"><span>合計</span><strong id="editTotal"></strong></div><button class="save-budget" id="saveBudget">保存する</button></dialog><dialog id="detailModal"><div class="modal-head"><div><p id="detailTicker" class="eyebrow"></p><h2 id="detailName"></h2></div><button id="closeModal">×</button></div><div id="detailBadge" class="badge"></div><div class="dd-lead"><p id="detailSummary"></p></div><section class="dd"><h3>① どうやって稼ぐ会社？</h3><p id="detailBusiness"></p></section><section class="dd"><h3>② 強みは何？</h3><p id="detailMoat"></p></section><section class="dd"><h3>③ 成長してる？</h3><p id="detailGrowth"></p></section><section class="dd"><h3>④ 数字で見る</h3><div id="detailMetrics" class="metrics"></div><p class="note">※ 数値はDD更新時点の目安。買う前に最新決算で再確認。</p></section><section class="dd"><h3>⑤ これから見るポイント</h3><p id="detailPoint"></p></section><section class="dd"><h3>⑥ 主なリスク</h3><p id="detailRisk"></p></section><section class="dd verdict"><h3>⑦ 結論</h3><p id="detailWhy"></p><div class="judgement"><span>いまの判断</span><strong id="detailJudge"></strong></div></section></dialog><script src="app.js?v=5"></script></body></html>
